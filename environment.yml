# conda env create -f environment.yml && conda activate DRLNav
# PyTorch + CUDA 11.8 from pytorch / nvidia; other deps from conda-forge.
name: DRLNav
channels:
  - pytorch
  - nvidia
  - conda-forge
dependencies:
  - python>=3.10,<3.12
  - pytorch==2.5.1
  - torchvision==0.20.1
  - torchaudio==2.5.1
  - pytorch-cuda=11.8
  - numpy>=1.22
  - scipy>=1.9
  - matplotlib>=3.5
  - scikit-image>=0.19
  - pillow>=9.0
  - imageio>=2.25
  - pyyaml>=6.0
  - tensorboard>=2.12
  - sympy>=1.11
  - pip
  - pip:
      - ray>=2.8
      - wandb>=0.15
